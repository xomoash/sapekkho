<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f3f4f6" />
  <link rel="manifest" href="manifest.json" />
  <title>Sapekkho</title>
  
  <link rel="stylesheet" href="tabler-icons.min.css" />
  <link rel="stylesheet" href="hind-siliguri.css" />

  <style>
    :root {
      /* Fluent Design Light Theme */
      --color-background-app: #f3f4f6;
      --color-background-sidebar: #e5e7eb;
      --color-background-card: #ffffff;
      --color-background-card-hover: #f9fafb;
      
      --color-text-primary: #111827;
      --color-text-secondary: #4b5563;
      --color-text-tertiary: #6b7280;
      
      --color-border-subtle: rgba(0, 0, 0, 0.05);
      --color-border-card: #e5e7eb;
      --color-border-active: #d1d5db;

      --color-accent: #0067c0;
      --color-accent-hover: #005a9e;
      --color-accent-text: #ffffff;

      --border-radius-sm: 4px;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    .dark {
      /* Fluent Design Dark Theme */
      --color-background-app: #202020;
      --color-background-sidebar: #282828;
      --color-background-card: #2d2d2d;
      --color-background-card-hover: #333333;
      
      --color-text-primary: #ffffff;
      --color-text-secondary: #cccccc;
      --color-text-tertiary: #999999;
      
      --color-border-subtle: rgba(255, 255, 255, 0.05);
      --color-border-card: #3d3d3d;
      --color-border-active: #4a4a4a;

      --color-accent: #4cc2ff;
      --color-accent-hover: #47b1e8;
      --color-accent-text: #000000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Hind Siliguri', 'Segoe UI Variable', 'Segoe UI', sans-serif;
      background: var(--color-background-app);
      color: var(--color-text-primary);
      transition: background-color 0.2s, color 0.2s;
      overflow: hidden; 
    }

    .titlebar {
      height: 38px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding-left: 12px;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1000;
    }

    #root {
      display: flex;
      height: 100vh;
      padding-top: 38px; 
    }

    .sidebar {
      width: 240px;
      background: var(--color-background-app);
      display: flex;
      flex-direction: column;
      padding: 12px;
      border-right: 1px solid var(--color-border-subtle);
    }

    .main-content {
      flex: 1;
      background: var(--color-background-card);
      border-top-left-radius: var(--border-radius-md);
      box-shadow: -1px -1px 4px var(--color-border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin-top: 4px;
    }

    .scrollable-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    ::-webkit-scrollbar { width: 14px; }
    ::-webkit-scrollbar-thumb {
      background-clip: padding-box;
      border: 4px solid transparent;
      border-radius: 8px;
      background-color: var(--color-text-tertiary);
    }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--color-text-secondary); }

    .win-btn {
      background: var(--color-background-card);
      border: 1px solid var(--color-border-card);
      color: var(--color-text-primary);
      padding: 6px 12px;
      border-radius: var(--border-radius-sm);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.1s;
    }
    .win-btn:hover { background: var(--color-background-card-hover); }
    .win-btn.primary { background: var(--color-accent); color: var(--color-accent-text); border: none; }
    .win-btn.primary:hover { background: var(--color-accent-hover); }

    .win-toolbar-btn {
      background: transparent;
      border: none;
      color: var(--color-text-secondary);
      padding: 4px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .win-toolbar-btn:hover { background: var(--color-border-card); color: var(--color-text-primary); }

    .nav-item {
      padding: 8px 12px;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
      color: var(--color-text-primary);
      -webkit-app-region: no-drag;
    }
    .nav-item:hover { background: var(--color-background-sidebar); }
    .nav-item.active { background: var(--color-background-sidebar); position: relative; }
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 25%; bottom: 25%;
      width: 3px; background: var(--color-accent); border-radius: 4px;
    }

    .task-card {
      background: var(--color-background-card);
      border: 1px solid var(--color-border-card);
      border-radius: var(--border-radius-md);
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: box-shadow 0.1s;
    }
    .task-card:hover { background: var(--color-background-card-hover); }
    
    .win-checkbox {
      width: 20px; height: 20px;
      border-radius: 4px;
      border: 1px solid var(--color-border-active);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
    }
    .win-checkbox.checked {
      background: var(--color-accent); border-color: var(--color-accent); color: var(--color-accent-text);
    }

    .win-input {
      width: 100%;
      background: var(--color-background-card);
      border: 1px solid var(--color-border-card);
      border-bottom: 2px solid var(--color-border-active);
      border-radius: var(--border-radius-sm);
      padding: 8px 12px;
      color: var(--color-text-primary);
      font-family: inherit; font-size: 14px;
      outline: none; transition: border-bottom-color 0.2s;
    }
    .win-input:focus { border-bottom-color: var(--color-accent); background: var(--color-background-card-hover); }

    .rich-text-editor {
      min-height: 80px;
      padding: 12px;
      border: 1px solid var(--color-border-card);
      border-radius: var(--border-radius-sm);
      background: var(--color-background-card);
      color: var(--color-text-primary);
      outline: none;
      font-size: 14px;
      line-height: 1.5;
    }
    .rich-text-editor:empty:before {
      content: attr(data-placeholder);
      color: var(--color-text-tertiary);
    }

    /* Calendar Grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 16px;
    }
    .cal-header {
      text-align: center; font-weight: 600; font-size: 12px; color: var(--color-text-secondary);
      padding-bottom: 8px;
    }
    .cal-day {
      aspect-ratio: 1;
      border: 1px solid var(--color-border-card);
      border-radius: var(--border-radius-sm);
      padding: 8px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: background 0.1s;
      position: relative;
    }
    .cal-day:hover { background: var(--color-background-card-hover); }
    .cal-day.active-day { border-color: var(--color-accent); background: var(--color-background-card-hover); }
    .cal-day.today { font-weight: bold; color: var(--color-accent); }
    .cal-day .task-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--color-accent);
      position: absolute; bottom: 8px;
    }
    .cal-day.empty { visibility: hidden; }

    .rich-content b, .rich-content strong { font-weight: bold; }
    .rich-content i, .rich-content em { font-style: italic; }
    .rich-content ul { margin: 4px 0; padding-left: 20px; }
    
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--color-border-subtle);
    }
    
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--color-border-active);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch.on { background: var(--color-accent); }
    .toggle-switch-handle {
      position: absolute;
      top: 2px; left: 2px;
      width: 20px; height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.on .toggle-switch-handle {
      transform: translateX(20px);
    }

    .context-menu {
      position: fixed;
      z-index: 9999;
      min-width: 180px;
      background: var(--color-background-card);
      border: 1px solid var(--color-border-card);
      border-radius: var(--border-radius-md);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      padding: 4px 0;
      animation: ctxFadeIn 0.1s ease;
    }
    @keyframes ctxFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      color: var(--color-text-primary);
      transition: background 0.1s;
    }
    .context-menu-item:hover {
      background: var(--color-background-card-hover);
    }
    .context-menu-item.danger {
      color: #dc2626;
    }
    .context-menu-separator {
      height: 1px;
      background: var(--color-border-subtle);
      margin: 4px 0;
    }

    .edit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ctxFadeIn 0.15s ease;
    }
    .edit-modal {
      background: var(--color-background-card);
      border: 1px solid var(--color-border-card);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      width: 480px;
      max-width: 90vw;
      box-shadow: 0 16px 48px rgba(0,0,0,0.25);
    }
    
    .settings-card {
      background: var(--color-background-card);
      border: 1px solid var(--color-border-card);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 12px var(--color-border-subtle);
    }
    .settings-card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--color-text-primary);
    }
    .profile-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--color-accent);
      color: var(--color-accent-text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: opacity 0.2s;
    }
    .profile-badge:hover { opacity: 0.8; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(6px); }
      45% { transform: translateX(-5px); }
      60% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="react.production.min.js"></script>
  <script src="react-dom.production.min.js"></script>
  <script>
    window.storage = {
      get: async () => null,
      set: async () => { },
    };
  </script>
  <script src="renderer.js"></script>
</body>
</html>
